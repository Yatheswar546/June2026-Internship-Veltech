<body>
    
    <h1>JSON (JavaScript Object Notation)</h1>

    <!-- 

        Why JSON?
        * Before JSON, XML was used.

        * XML (eXtensible Markup Language) is a markup language designed to store and transport data in a structured format.
        * It was used before JSON, but data transfer was more complex because of its tag-based structure (similar to HTML).

        XML Approach:
        <?xml version="1.0" encoding="UTF-8"?>
        <bookstore>
          <book category="fiction">
            <title>The Great Gatsby</title>
            <author>F. Scott Fitzgerald</author>
            <year>1925</year>
            <price>14.99</price>
          </book>
          <book category="classic">
            <title>To Kill a Mockingbird</title>
            <author>Harper Lee</author>
            <year>1960</year>
            <price>12.99</price>
          </book>
        </bookstore>

        XML Problems:
            Verbose (too many tags)
            Heavy
            Slower parsing using XML parser

        JSON Approach:
        {
          "bookstore": {
            "books": [
              {
                "category": "fiction",
                "title": "The Great Gatsby",
                "author": "F. Scott Fitzgerald",
                "year": 1925,
                "price": 14.99
              },
              {
                "category": "classic",
                "title": "To Kill a Mockingbird",
                "author": "Harper Lee",
                "year": 1960,
                "price": 12.99
              }
            ]
          }
        }

        JSON Advantages:
            Less verbose
            Faster
            Human-readable
            Matches JavaScript objects
            Easily parsed using JSON.parse()
            For AJAX Applications, JSON is faster and easier.
            Objects align in code
            Structured in easier way

        ===================================

        JSON is basically a text format that makes it easy to share data between Clients and Servers. 
        
        It is a lightweight format for strings and transporting data from a server to webpage, it is "self-describing" 
        and easy to understand.
        
        It is widely used across many Languages like C, Ruby, Python, PHP etc....

        ==> We use JSON for such situations in which data is passed in an array of objects.

        Eg:
        Object
        var mObj = {
            "name": "Yatheswar",
            "age": 24
        }

        console.log(mObj.age);

        Array
        var mArr = [1,2,3,4,5]
        console.log(mArr[0]);

        JSON
        var mJson = [
            {
                "name": "Yatheswar",
                "age": 24
            },
            {
                "name": "Harsha",
                "age": 21
            },
            {
                "name": "Akash",
                "age": 21
            }
        ]

        ==> JSON doesn't hold undefined, functions and date it's just simply ignore them.

        var mJson = [
            {
                "name": "Yatheswar",
                "age": 24,
                "lastName": undefined
            },
            {
                "name": "Harsha",
                "age": 21,
                "getName": function(){
                    return this.name
                }
            },
            {
                "name": "Akash",
                "age": 21
            }
        ]

        ==> JSON accepts string, number, object, array, boolean, null

        var mJson = [
            {
                "name": "Yatheswar",
                "age": 24,
                "marriage": false
            },
            {
                "name": "Harsha",
                "age": 21,
                score: [87, 90, 75 87],
                "bike": null
            },
            {
                "name": "Akash",
                "age": 21,
                score: {
                    "C": 87,
                    "Java": 78,
                    "M1": 88
                }
            }
        ]

        JSON Flow:
                         JSON.parse()
            Web Page  <===============  SERVER
                      ================>
                        JSON.stringify()

        JSON.parse(): JSON string → JavaScript object
        => Data received from a server is usually in string format, so we need to parse it to convert it into an object.

        JSON.stringify(): JavaScript object → JSON string
        => Data should be sent to the server in string format.

    -->

    <h2>JSON Parse</h2>
    <textarea id="jsonInput" rows="4" cols="20" placeholder="Enter JSON e.g. {'name' : 'yathe'}"></textarea> <br>
    <button onclick="parseJSON()">Parse JSON</button>
    <pre id="parseResult"></pre>

    <h2>JSON Stringify</h2>
    <button onclick="stringifyJson()">Convert Object to JSON</button>
    <pre id="stringifyResult"></pre>
